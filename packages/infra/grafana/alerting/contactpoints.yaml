apiVersion: 1

# Telegram contact point. The bot token (the only real secret) comes from env
# (packages/infra/.env -> grafana container), never committed. chatid is not a
# credential and is hardcoded as a string (Grafana mis-parses an interpolated
# numeric chatid as a number).
contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-default
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: "8207631801"
        disableResolveMessage: false
